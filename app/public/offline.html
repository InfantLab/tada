<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#10b981" />
  <title>Ta-Da! — You're offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafaf9;
      color: #1c1917;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1c1917; color: #f5f5f4; }
      .card { background: #292524; border-color: #44403c; }
      .subtitle { color: #a8a29e; }
    }

    .card {
      background: #fff;
      border: 1px solid #e7e5e4;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      max-width: 22rem;
      width: 100%;
      text-align: center;
    }

    .emoji { font-size: 3rem; margin-bottom: 1rem; }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #78716c;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    button {
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    button:active { background: #059669; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">⚡</div>
    <h1>You're offline</h1>
    <p class="subtitle">
      Your data is safe. Ta-Da! will be back once you're connected again.
    </p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
